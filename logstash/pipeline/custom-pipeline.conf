input {
  jdbc {
    schedule => "*/10 * * * * *"
    jdbc_connection_string => "jdbc:postgresql://db:5432/business"
    jdbc_user => "postgres"
    jdbc_password => "1234"
    use_column_value => false
    record_last_run => false
    clean_run => true
    jdbc_driver_class => "org.postgresql.Driver"
    jdbc_driver_library => "/usr/share/logstash/postgresql-42.7.5.jar"
    statement => "SELECT videos.filename, description, videos.name, created_at, tags.names, videos.user_id FROM videos LEFT JOIN (
                                    	SELECT string_agg(name, ', ') AS names, video_id FROM tags
                                    	RIGHT JOIN videos_tags ON tags.id = videos_tags.tag_id GROUP BY video_id
                                    ) AS tags ON videos.filename = tags.video_id WHERE videos.status = 'UPLOADED'
                 "
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "videos"
    document_id => "%{filename}"
    doc_as_upsert => true
  }
}