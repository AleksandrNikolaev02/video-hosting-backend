server:
  port: 8080

spring:
  application:
    name: business
  datasource:
    url: jdbc:postgresql://localhost:5432/business
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
  data:
    redis:
      port: 6379
      host: localhost

logging:
  level:
    org.springframework: INFO
    org.apache.kafka: INFO
    org.springframework.kafka: INFO
    com.netflix.discovery: INFO
    org.springframework.cloud.netflix.eureka: WARN
    org.apache.hc.client5.http: WARN
    org.apache.hc.client5.http.wire: OFF

kafka:
  group-id: file-service-group
  bootstrap-server: localhost:9092

elasticsearch:
  host: localhost
  port: 9200

topics:
  delete-file-request: delete-file-request
  get-file-request: get-file-request
  file-events: file-events
  get-file-reply: get-file-reply
  file-answers: file-answers
  file-responses: file-responses
  create-user: create-user-in-db
  create-video: create-video-in-db
  compensating-transaction-business-service: compensating-transaction-business-service
  delete-data-channel: delete-data-channel
  publish-event-topic: publish-event

metrics:
  error-minio-service-metric: error_minio_service_metric
  success-minio-service-metric: success_minio_service_metric

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8889/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus
          - health
          - info
          - metrics
  prometheus:
    metrics:
      export:
        enabled: true