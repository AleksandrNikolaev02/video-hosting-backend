server:
  port: 8080

spring:
  application:
    name: business
  datasource:
    url: jdbc:postgresql://172.23.6.13:5432/business
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
  kafka:
    bootstrap-servers: "localhost:9092"
    consumer:
      group-id: file-service-group
      auto-offset-reset: earliest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      compression-type: gzip
    properties:
      spring.json.trusted.packages: "*"
      spring.json.value.default.type: com.example.dto.UserDTO
      max.request.size: 5242880
      buffer.memory: 5242880
  data:
    redis:
      port: 6379
      host: localhost

logging:
  level:
    org.springframework: INFO
    org.apache.kafka: INFO
    org.springframework.kafka: INFO
    com.netflix.discovery: INFO
    org.springframework.cloud.netflix.eureka: WARN
    org.apache.hc.client5.http: WARN
    org.apache.hc.client5.http.wire: OFF

topics:
  delete-file-request: delete-file-request
  get-file-request: get-file-request
  file-events: file-events
  get-file-reply: get-file-reply
  file-answers: file-answers
  file-responses: file-responses
  create-user: create-user-in-db

metrics:
  error-minio-service-metric: error_minio_service_metric
  success-minio-service-metric: success_minio_service_metric

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8889/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus
          - health
          - info
          - metrics
  prometheus:
    metrics:
      export:
        enabled: true