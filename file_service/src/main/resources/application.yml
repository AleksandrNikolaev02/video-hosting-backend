server:
  port: 8081
  tomcat:
    max-http-form-post-size: 10MB

spring:
  application:
    name: file-service
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: jdbc:postgresql://db:5432/file
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 25
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
  data:
    redis:
      port: 6379
      host: redis

file:
  dir: uploads
  chunk-size: 1048576
  preview-path: previews
  video-path: videos
minio:
  server:
    url: http://minio:9000
    access_key: admin
    secret_key: admin1234
    port: 9000

kafka:
  group-id: file-service-group
  bootstrap-server: kafka:9092

logging:
  level:
    org.springframework: INFO
    org.apache.kafka: INFO
    org.springframework.kafka: DEBUG
    com.netflix.discovery: INFO
    org.springframework.cloud.netflix.eureka: WARN
    org.apache.hc.client5.http: WARN
    org.apache.hc.client5.http.wire: OFF

topics:
  delete-file-request: delete-file-request
  get-file-request: get-file-request
  file-events: file-events
  get-file-reply: get-file-reply
  file-answers: file-answers
  file-responses: file-responses
  create-video: create-video-in-db
  publish-event-topic: publish-event
  delete-data-video: delete-data-video

schedule:
  time-clean-files: 30000
  time-clean-images: 30000

metrics:
  error-minio-service-metric: error_minio_service_metric
  success-minio-service-metric: success_minio_service_metric

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8889/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus
          - health
          - info
          - metrics
  prometheus:
    metrics:
      export:
        enabled: true